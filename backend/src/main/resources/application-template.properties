# ============================================================
# application-template.properties
# Copy this to application.properties and fill in your values.
# NEVER commit application.properties (it's in .gitignore).
# ============================================================

# Server
spring.application.name=ecommerce-backend
server.port=8080

# MongoDB Atlas
# Get from: https://cloud.mongodb.com → Connect → Connect your application
spring.data.mongodb.uri=mongodb+srv://<USERNAME>:<PASSWORD>@<CLUSTER>.mongodb.net/ecommerce_db?retryWrites=true&w=majority
spring.data.mongodb.database=ecommerce_db

# JWT
# Generate: openssl rand -base64 32
jwt.secret=REPLACE_WITH_BASE64_SECRET_MIN_32_CHARS
jwt.expiration=86400000

# Google OAuth2
# Get from: https://console.cloud.google.com → Credentials → OAuth 2.0 Client ID
# Redirect URI to add: http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=REPLACE_WITH_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=REPLACE_WITH_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.ecommerce=DEBUG
